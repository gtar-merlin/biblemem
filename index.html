<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Memorization - Philippians 2:1-18</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Bible Memorization</h1>
            <p class="subtitle">Philippians 2:1-18 (NIV)</p>
        </header>

        <div class="controls">
            <div class="difficulty-selector">
                <label for="difficulty">Difficulty Level:</label>
                <select id="difficulty" onchange="changeDifficulty()">
                    <option value="easy">Easy (25% blanked)</option>
                    <option value="medium" selected>Medium (50% blanked)</option>
                    <option value="hard">Hard (75% blanked)</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="resetSession()">New Session</button>
        </div>

        <div class="main-content">
            <div class="bible-text" id="bibleText">
                <!-- Bible text will be rendered here -->
            </div>

            <div class="word-options" id="wordOptions" style="display: none;">
                <p class="options-label">Select the correct word:</p>
                <div class="options-container" id="optionsContainer">
                    <!-- Options will be rendered here -->
                </div>
            </div>

            <div class="score-display" id="scoreDisplay" style="display: none;">
                <div class="score-card">
                    <h2>Session Complete!</h2>
                    <p class="final-score">Score: <span id="finalScore">0</span>%</p>
                    <p class="score-details">
                        <span id="correctCount">0</span> correct out of <span id="totalCount">0</span>
                    </p>
                    <button class="btn btn-primary" onclick="resetSession()">Try Again</button>
                    <button class="btn btn-secondary" onclick="changeDifficultyAndReset()">Change Difficulty</button>
                </div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <p class="progress-text">Progress: <span id="progressText">0</span>% complete</p>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
